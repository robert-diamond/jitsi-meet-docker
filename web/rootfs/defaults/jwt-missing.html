<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kanvene - Access Denied</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f6f7f9;
      color: #1f2328;
    }
    .wrap {
      max-width: 720px;
      margin: 10vh auto;
      padding: 32px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0 0 10px;
      line-height: 1.5;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Kanvene - Access denied</h1>
    <p>This meeting requires a valid JWT token.</p>
    <p>Please request a new invite link or sign in through your organization.</p>
    <p>If you believe this is an error, contact your administrator.</p>
  </div>
</body>
</html>
