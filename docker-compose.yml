version: "3.8"

services:
    # Kanvene-branded Jitsi Meet Web UI
    web:
        image: robertdiamond/jitsi-web-kanvene:latest
        restart: unless-stopped
        ports:
            - "9000:80"
            - "9443:443"
        environment:
            - XMPP_SERVER=prosody
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - XMPP_BOSH_URL_BASE=${XMPP_BOSH_URL_BASE}
            - XMPP_WS_SERVER=${XMPP_WS_SERVER}
            - TZ=${TZ}
        volumes:
            - web_config:/config
            - web_certs:/etc/jitsi/web/certs
        networks:
            - jitsi
        depends_on:
            - prosody

    # XMPP Server
    prosody:
        image: jitsi/prosody:${JITSI_IMAGE_VERSION:-unstable}
        restart: unless-stopped
        expose:
            - "5222"
            - "5347"
            - "5280"
        environment:
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - XMPP_MODULES=${XMPP_MODULES}
            - XMPP_MUC_MODULES=${XMPP_MUC_MODULES}
            - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
            - JVB_AUTH_USER=${JVB_AUTH_USER}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JIGASI_XMPP_USER=${JIGASI_XMPP_USER}
            - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
            - JIBRI_XMPP_USER=${JIBRI_XMPP_USER}
            - JIBRI_XMPP_PASSWORD=${JIBRI_XMPP_PASSWORD}
            - TURN_CREDENTIALS=${TURN_CREDENTIALS}
            - TURN_HOST=${TURN_HOST}
            - TURN_PORT=${TURN_PORT}
            - TURNS_HOST=${TURNS_HOST}
            - TURNS_PORT=${TURNS_PORT}
            - TZ=${TZ}
        volumes:
            - prosody_certs:/etc/prosody/certs
            - prosody_config:/etc/prosody
        networks:
            - jitsi

    # XMPP Component (Jicofo)
    jicofo:
        image: jitsi/jicofo:${JITSI_IMAGE_VERSION:-unstable}
        restart: unless-stopped
        expose:
            - "5347"
        environment:
            - XMPP_SERVER=prosody
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
            - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER}
            - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
            - JICOFO_RESERVATION_ENABLE=${JICOFO_RESERVATION_ENABLE}
            - JICOFO_RESERVATION_REST_BASE_URL=${JICOFO_RESERVATION_REST_BASE_URL}
            - TZ=${TZ}
        volumes:
            - jicofo_config:/config
        networks:
            - jitsi
        depends_on:
            - prosody

    # XMPP Videobridge
    jvb:
        image: jitsi/jvb:${JITSI_IMAGE_VERSION:-unstable}
        restart: unless-stopped
        ports:
            - "10000:10000/udp"
            - "4443:4443"
        environment:
            - XMPP_SERVER=prosody
            - XMPP_DOMAIN=${XMPP_DOMAIN}
            - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
            - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
            - JVB_AUTH_USER=${JVB_AUTH_USER}
            - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
            - JVB_BREWERY_MUC=${JVB_BREWERY_MUC}
            - JVB_PORT=10000
            - JVB_TCP_HARVESTER_DISABLED=${JVB_TCP_HARVESTER_DISABLED}
            - JVB_TCP_PORT=4443
            - JVB_STUN_SERVERS=${JVB_STUN_SERVERS}
            - JVB_ENABLE_APIS=${JVB_ENABLE_APIS}
            - JICOFO_AUTH_USER=${JICOFO_AUTH_USER}
            - COLIBRI_REST_ENABLED=${COLIBRI_REST_ENABLED}
            - COLIBRI_REST_PORT=${COLIBRI_REST_PORT}
            - TZ=${TZ}
        volumes:
            - jvb_config:/config
        networks:
            - jitsi
        depends_on:
            - prosody

networks:
    jitsi:
        driver: bridge

volumes:
    web_config:
    web_certs:
    prosody_config:
    prosody_certs:
    jicofo_config:
    jvb_config:
